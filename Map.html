<!DOCTYPE html>
<html>
<head>
  <title>Smart Map</title>
</head>

<body>
  <h2>Finding nearest hospital...</h2>

  <script>
    async function openMap() {

      // ===== GET BLOOD FROM URL =====
      const params = new URLSearchParams(window.location.search);
      let blood = params.get("blood");

      if (!blood) {
        document.body.innerHTML = "<h3>No blood group received</h3>";
        return;
      }

      try {
        // ✅ CLEAN INPUT
        blood = blood.trim().toUpperCase();

        // ✅ GOOGLE SCRIPT URL
        const url =
          "https://script.google.com/macros/s/AKfycbwuG13bIWiqAxhxoT1DRfH1dYAi8JPTfdKiAPxqoY-0dTqOQnB6qum7dAnDf2MTQV6s-Q/exec?blood=" +
          encodeURIComponent(blood);

        console.log("Calling:", url);

        // ✅ FETCH DATA
        const response = await fetch(url);

        if (!response.ok) {
          throw new Error("Failed to fetch data");
        }

        const data = await response.json();

        console.log("Response:", data);

        const lat = Number(data.latitude);
        const lon = Number(data.longitude);

        // ===== SUCCESS =====
        if (!isNaN(lat) && !isNaN(lon)) {

          // ✅ REDIRECT (STABLE LINK)
          window.location.href =
            "https://www.google.com/maps/search/?api=1&query=" +
            lat + "," + lon;

        } else {
          document.body.innerHTML =
            "<h3>No location found</h3><pre>" +
            JSON.stringify(data) +
            "</pre>";
        }

      } catch (error) {

        console.log("ERROR:", error);

        document.body.innerHTML =
          "<h3>Error fetching location</h3><pre>" +
          error +
          "</pre>";
      }
    }

    // RUN ON LOAD
    openMap();
  </script>

</body>
</html>
