<!DOCTYPE html>
<html>
<head>
  <title>Smart Map</title>

  <script>
    async function openMap() {

      // ===== GET BLOOD FROM URL =====
      const params = new URLSearchParams(window.location.search);
      let blood = params.get("blood");

      if (!blood) {
        document.body.innerHTML = "<h3>No blood group received</h3>";
        return;
      }

      try {

        // ✅ ALWAYS NORMALIZE INPUT
        blood = blood.trim().toUpperCase();

        console.log("Blood received:", blood);

        // ✅ IMPORTANT: ALWAYS ENCODE BEFORE SENDING
        const encodedBlood = encodeURIComponent(blood);

        // ===== CALL GOOGLE SCRIPT =====
        const url =
          "https://script.google.com/macros/s/AKfycbwuG13bIWiqAxhxoT1DRfH1dYAi8JPTfdKiAPxqoY-0dTqOQnB6qum7dAnDf2MTQV6s-Q/exec?blood=" +
          encodedBlood;

        console.log("Calling:", url);

        const response = await fetch(url, { redirect: "follow" });
        const text = await response.text();

        console.log("RAW RESPONSE:", text);

        // ===== SAFE JSON PARSE =====
        const data = JSON.parse(text);

        const lat = Number(data.latitude);
        const lon = Number(data.longitude);

        console.log("Lat:", lat, "Lon:", lon);

        // ===== VALIDATION =====
        if (!isNaN(lat) && !isNaN(lon)) {

          // ✅ REDIRECT TO GOOGLE MAPS
          window.location.href =
            "https://www.google.com/maps?q=" + lat + "," + lon;

        } else {

          document.body.innerHTML =
            "<h3>No location found</h3><pre>" + text + "</pre>";
        }

      } catch (error) {

        console.log("ERROR:", error);

        document.body.innerHTML =
          "<h3>Error fetching location</h3><pre>" + error + "</pre>";
      }
    }
  </script>

</head>

<body onload="openMap()">
  <h2>Finding nearest hospital...</h2>
</body>
</html>
