<!DOCTYPE html>
<html>
<head>
  <title>Smart Map</title>
</head>

<body>
  <h2>Finding nearest hospital...</h2>

  <script>
    async function openMap() {

      const params = new URLSearchParams(window.location.search);
      let blood = params.get("blood");

      if (!blood) {
        document.body.innerHTML = "<h3>No blood group received</h3>";
        return;
      }

      try {
        blood = blood.trim().toUpperCase();

        const url =
          "https://script.google.com/macros/s/AKfycbwuG13bIWiqAxhxoT1DRfH1dYAi8JPTfdKiAPxqoY-0dTqOQnB6qum7dAnDf2MTQV6s-Q/exec?blood=" +
          encodeURIComponent(blood);

        const response = await fetch(url);
        const data = await response.json();

        const lat = Number(data.latitude);
        const lon = Number(data.longitude);

        if (!isNaN(lat) && !isNaN(lon)) {

          // ✅ SHOW BUTTON INSTEAD OF REDIRECT
          document.body.innerHTML = `
            <h2>Location Found ✅</h2>
            <p>Blood Group: ${data.blood}</p>
            <button onclick="openMaps(${lat}, ${lon})"
              style="padding:10px;font-size:16px;">
              Open in Google Maps
            </button>
          `;

        } else {
          document.body.innerHTML =
            "<h3>No location found</h3><pre>" +
            JSON.stringify(data) +
            "</pre>";
        }

      } catch (error) {
        document.body.innerHTML =
          "<h3>Error</h3><pre>" + error + "</pre>";
      }
    }

    function openMaps(lat, lon) {
      window.open(
        "https://www.google.com/maps/search/?api=1&query=" + lat + "," + lon,
        "_blank"
      );
    }

    openMap();
  </script>

</body>
</html>
